# Static site SAM configuration
version = 0.1

[default.global.parameters]
stack_name = "vaikia-dev-static-site"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true

[default.package.parameters]
resolve_s3 = true

[dev.deploy.parameters]
stack_name = "vaikia-dev-static-site"
resolve_s3 = true
s3_prefix = "vaikia-dev-static-site"
profile = "hooseedev"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
disable_rollback = true
image_repositories = []
parameter_overrides = "DomainName=vaikia.dev CertificateArn=arn:aws:acm:us-east-1:738394721489:certificate/c819c3ba-e571-4642-97ac-9140b3b85697"

[dev.global.parameters]
region = "eu-north-1"

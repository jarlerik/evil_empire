# Static site SAM configuration
version = 0.1

[default.global.parameters]
stack_name = "getpeaktrack-static-site"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true

[default.package.parameters]
resolve_s3 = true

[dev.deploy.parameters]
stack_name = "getpeaktrack-static-site"
resolve_s3 = true
s3_prefix = "getpeaktrack-static-site"
profile = "hooseedev"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
disable_rollback = true
image_repositories = []
parameter_overrides = "DomainName=getpeaktrack.com CertificateArn=arn:aws:acm:us-east-1:738394721489:certificate/6df252c8-98b1-4456-a5bd-594372739b88"

[dev.global.parameters]
region = "eu-north-1"

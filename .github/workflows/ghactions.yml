name: GitHub Actions
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  read-template:
    runs-on: ubuntu-latest
    steps:
      - name: "Read template"
        id: "read_template"
        run: |
          echo "$(cat .github/ISSUE_TEMPLATE/custom.md)" >> $GITHUB_OUTPUT
      # test to see if done correctly - should echo "value"
      - run: echo ${{ steps.read_template.outputs }}
      - run: gh issue create --title "From template" --body "${{ steps.read_template.outputs }}"
        env:
          GH_TOKEN: ${{ github.GH_TOKEN }}
